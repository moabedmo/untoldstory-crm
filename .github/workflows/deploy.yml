name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing GitHub secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - name: Build
        env:
          VITE_USE_SUPABASE: ${{ secrets.VITE_USE_SUPABASE }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
        run: npm run build

      - name: Pack Hostinger bundle
        run: node scripts/pack-hostinger.mjs --skip-build

      - name: Deploy via FTP to Hostinger
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: node scripts/deploy-hostinger-ftp.mjs

      - name: Verify live site bundle
        env:
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
        run: |
          set -euo pipefail
          BUNDLE=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' hostinger-dist/index.html | head -1 || true)
          echo "Built bundle: ${BUNDLE:-unknown}"
          if [ -z "${VITE_PUBLIC_APP_URL:-}" ]; then
            echo "Skip live check: VITE_PUBLIC_APP_URL secret not set."
            exit 0
          fi
          ORIGIN="${VITE_PUBLIC_APP_URL%/}"
          HTML=$(curl -fsSL --max-time 45 "$ORIGIN/" || curl -fsSL --max-time 45 "$ORIGIN/index.html" || true)
          if [ -z "$HTML" ]; then
            echo "::warning::Could not fetch $ORIGIN — check DNS/SSL or set VITE_PUBLIC_APP_URL."
            exit 0
          fi
          if [ -n "$BUNDLE" ] && echo "$HTML" | grep -q "$BUNDLE"; then
            echo "Live site serves the new bundle ($BUNDLE)."
          else
            LIVE=$(echo "$HTML" | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1 || true)
            echo "::error::Live bundle (${LIVE:-none}) does not match build ($BUNDLE). Clear CDN/cache or set FTP_REMOTE_DIR."
            exit 1
          fi
